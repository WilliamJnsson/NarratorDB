services:
  narratordb:
    build: .
    command:
      - narratordb
      - service
      - quickstart
      - --data-dir
      - /data
      - --credentials-file
      - /data/credentials.env
      - --project
      - default
      - --no-register-codex
      - --host
      - 0.0.0.0
      - --port
      - "8787"
      - --public-url
      - http://127.0.0.1:8787
    ports:
      - "127.0.0.1:8787:8787"
    volumes:
      - ./.narratordb-service:/data
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
